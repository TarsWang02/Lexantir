name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (macOS, JDK 23)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: wordbook-java
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "23"
          cache: maven
          cache-dependency-path: wordbook-java/pom.xml

      - name: Compile & package (shaded fat jar)
        run: mvn -B -ntp clean package -DskipTests

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: WordBook-jar
          path: wordbook-java/target/WordBook.jar
          if-no-files-found: error
